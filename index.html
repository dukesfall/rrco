<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Robot Repair Co.</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --logo-spin-speed: 4s;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #000000;
      color: #111111;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;

      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.035) 0,
        rgba(255, 255, 255, 0.035) 1px,
        rgba(0, 0, 0, 0.08) 1px,
        rgba(0, 0, 0, 0.08) 4px
      );

      opacity: 0.72;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 101;
      pointer-events: none;

      background: rgba(255, 255, 255, 0.008);
      opacity: 0.12;

      animation: crtFlicker 4.8s steps(1, end) infinite;
    }

    @keyframes crtFlicker {
      0% {
        opacity: 0.10;
      }

      8% {
        opacity: 0.13;
      }

      9% {
        opacity: 0.08;
      }

      18% {
        opacity: 0.11;
      }

      32% {
        opacity: 0.09;
      }

      33% {
        opacity: 0.14;
      }

      34% {
        opacity: 0.10;
      }

      51% {
        opacity: 0.12;
      }

      67% {
        opacity: 0.09;
      }

      68% {
        opacity: 0.13;
      }

      82% {
        opacity: 0.10;
      }

      100% {
        opacity: 0.11;
      }
    }

    .logo-stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 450px;
      perspective-origin: 50% 50%;
      pointer-events: none;
    }

    .logo-scene {
      position: relative;
      width: min(620px, 94vw, 80vh);
      aspect-ratio: 1 / 1;
      transform-style: preserve-3d;
    }

    .logo-anchor {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(420px, 67.7%);
      aspect-ratio: 1 / 1;
      transform: translate(-50%, -55%);
      transform-style: preserve-3d;
      z-index: 2;
    }

    .logo-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: turntableSpin var(--logo-spin-speed) linear infinite;
      will-change: transform;
    }

    .logo-face,
    .logo-depth {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transform-style: preserve-3d;
      backface-visibility: visible;
      -webkit-backface-visibility: visible;
    }

    .logo-face {
      transform: translateZ(4px);

      filter:
        drop-shadow(1.5px 0 0 rgba(255, 35, 80, 0.42))
        drop-shadow(-1.5px 0 0 rgba(0, 210, 255, 0.42));
    }

    .logo-depth {
      filter: brightness(0.7);
    }

    .logo-depth-1 {
      transform: translateZ(3px);
    }

    .logo-depth-2 {
      transform: translateZ(2px);
    }

    .logo-depth-3 {
      transform: translateZ(1px);
    }

    .logo-depth-4 {
      transform: translateZ(0);
    }

    .logo-depth-5 {
      transform: translateZ(-1px);
    }

    .logo-depth-6 {
      transform: translateZ(-2px);
    }

    .logo-depth-7 {
      transform: translateZ(-3px);
    }

    .logo-depth-8 {
      transform: translateZ(-4px);
    }

    .logo-subline {
      position: absolute;
      left: 50%;
      top: calc(50% + min(235px, 37.9%));
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      color: #b5b5b5;
      font-size: clamp(12px, 1.5vw, 16px);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 3;
    }

    @keyframes turntableSpin {
      from {
        transform: rotateY(0deg);
      }

      to {
        transform: rotateY(360deg);
      }
    }

    footer {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      padding: 20px 24px;
      text-align: center;
      background: #000000;
      z-index: 10;
    }

    .footer-text {
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #777777;
      font-weight: 500;
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-wrap,
      body::after {
        animation: none;
      }
    }
  </style>
</head>

<body>

  <main class="logo-stage">
    <div class="logo-scene">

      <div class="logo-anchor">
        <div class="logo-wrap">

          <img
            src="https://www.robotrepair.co/RR_Co.png"
            alt=""
            aria-hidden="true"
            class="logo-depth logo-depth-8"
          />

          <img
            src="https://www.robotrepair.co/RR_Co.png"
            alt=""
            aria-hidden="true"
            class="logo-depth logo-depth-7"
          />

          <img
            src="https://www.robotrepair.co/RR_Co.png"
            alt=""
            aria-hidden="true"
            class="logo-depth logo-depth-6"
          />

          <img
            src="https://www.robotrepair.co/RR_Co.png"
            alt=""
            aria-hidden="true"
            class="logo-depth logo-depth-5"
          />

          <img
            src="https://www.robotrepair.co/RR_Co.png"
            alt=""
            aria-hidden="true"
            class="logo-depth logo-depth-4"
          />

          <img
            src="https://www.robotrepair.co/RR_Co.png"
            alt=""
            aria-hidden="true"
            class="logo-depth logo-depth-3"
          />

          <img
            src="https://www.robotrepair.co/RR_Co.png"
            alt=""
            aria-hidden="true"
            class="logo-depth logo-depth-2"
          />

          <img
            src="https://www.robotrepair.co/RR_Co.png"
            alt=""
            aria-hidden="true"
            class="logo-depth logo-depth-1"
          />

          <img
            src="https://www.robotrepair.co/RR_Co.png"
            alt="Robot Repair Co. Logo"
            class="logo-face"
          />

        </div>
      </div>

      <p class="logo-subline">WE FIX BOTS</p>

    </div>
  </main>

  <footer>
    <p class="footer-text">
      Robot Repair Co. - We Fix Bots © <span id="year"></span>. All rights reserved.
    </p>
  </footer>

  <script>
    document.getElementById("year").textContent =
      new Date().getFullYear();
  </script>

</body>
</html>
